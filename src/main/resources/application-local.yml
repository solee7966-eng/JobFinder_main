# 로컬 개발용 설정 (Public Portfolio Version)

spring:
  config:
    activate:
      on-profile: local

  datasource-myspringbootuser:
    driver-class-name: oracle.jdbc.OracleDriver
    jdbcUrl: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true

file:
  upload-dir: file_upload
  photoupload-dir: file_photoupload
  emailattachfile-dir: file_emailattachfile
  images-dir: file_images

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}